services:
  nexus:
    image: sonatype/nexus3
    restart: on-failure
    volumes:
      - nexus-data:/nexus-data
    ports:
      - 8081:8081
      - 8082:8082
      - 8083:8083
    networks:
      - DEVOPS_NET
  jenkins-curso:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    user: root
    group_add:
      - 1001 
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8080:8080
    networks:
      - DEVOPS_NET

volumes:
  nexus-data:
  jenkins-data:

networks:
  DEVOPS_NET:
